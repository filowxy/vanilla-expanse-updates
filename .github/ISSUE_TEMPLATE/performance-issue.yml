name: Performance Issue
description: TPS drops, lag, frame loss, high memory usage.
title: "[Perf] "
labels: ["performance"]
body:
  - type: markdown
    attributes:
      value: |
        Performance issues require concrete data to diagnose. Please provide F3 debug info and your hardware configuration.

  - type: dropdown
    id: perf-symptom
    attributes:
      label: Lag type
      description: Describe the main symptom you are experiencing.
      options:
        - Sustained low TPS (mspt constantly 50ms+)
        - Occasional spikes (mspt occasionally jumps to 100ms+)
        - Chunk loading lag (visible lag while moving)
        - Entity cluster lag (mob farms / animal-dense areas)
        - Dimension change lag (entering Nether / End)
        - Slow loading / startup
        - Excessive memory usage
        - Low GPU frame rate
    validations:
      required: true

  - type: textarea
    id: scenario
    attributes:
      label: Trigger scenario
      description: When does it occur? Player position, biome, nearby entity count, what you are doing.
      placeholder: |
        e.g. In a main world village with 30+ villagers and 60+ animals nearby, TPS drops to 12.
    validations:
      required: true

  - type: file
    id: f3-screenshot
    attributes:
      label: F3 screenshot(s) (required)
      description: |
        Drag and drop screenshots of the F3 debug screen here, or click to browse.
        Accepted: `.png`, `.jpg`, `.jpeg`, `.gif` (max 25MB per file).
        Please attach:
        - One shot of the right side (mspt graph + memory)
        - One shot of the left side (chunk + entity stats)
        If you cannot screenshot, leave empty and fill the numeric fields below.
    validations:
      required: true

  - type: file
    id: log-attach
    attributes:
      label: Latest log file (recommended)
      description: |
        Drag and drop `logs/latest.log` here for context. Helps correlate perf issues
        with background errors or warnings.
    validations:
      required: false

  - type: input
    id: mspt
    attributes:
      label: Average mspt (ms/tick)
      placeholder: "35"
    validations:
      required: true

  - type: input
    id: tps
    attributes:
      label: Estimated TPS
      placeholder: "15"
    validations:
      required: true

  - type: input
    id: ram-allocated
    attributes:
      label: Allocated heap memory
      placeholder: "4G (ZGC, -Xmx4096m)"
    validations:
      required: true

  - type: input
    id: ram-actual
    attributes:
      label: Actual memory usage (F3 top)
      placeholder: "3200 MB / 4096 MB"
    validations:
      required: true

  - type: input
    id: render-distance
    attributes:
      label: Render distance / simulation distance
      placeholder: "12 / 10"
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: "Windows 11 64-bit"
    validations:
      required: true

  - type: input
    id: cpu
    attributes:
      label: CPU
      placeholder: "AMD Ryzen 7 8845H"
    validations:
      required: true

  - type: input
    id: gpu
    attributes:
      label: GPU
      placeholder: "NVIDIA GeForce RTX 4060 Laptop"
    validations:
      required: true

  - type: checkboxes
    id: preflight
    attributes:
      label: Pre-submission checklist
      options:
        - label: I have attached an F3 screenshot showing the lag
          required: true
        - label: I have confirmed this is a persistent issue (not a one-off)
          required: true
        - label: I have tried lowering render distance; the problem persists
          required: true
