name: Performance Issue
description: TPS drops, lag, frame loss, high memory usage.
title: "[Perf] "
labels: ["performance"]
body:
  - type: markdown
    attributes:
      value: |
        Performance issues require concrete data to diagnose. Please provide F3 debug info and your hardware configuration.

  - type: dropdown
    id: perf-symptom
    attributes:
      label: Lag type
      description: Describe the main symptom you are experiencing.
      options:
        - Sustained low TPS (mspt constantly 50ms+)
        - Occasional spikes (mspt occasionally jumps to 100ms+)
        - Chunk loading lag (visible lag while moving)
        - Entity cluster lag (mob farms / animal-dense areas)
        - Dimension change lag (entering Nether / End)
        - Slow loading / startup
        - Excessive memory usage
        - Low GPU frame rate
    validations:
      required: true

  - type: textarea
    id: scenario
    attributes:
      label: Trigger scenario
      description: When does it occur? Player position, biome, nearby entity count, what you are doing.
      placeholder: |
        e.g. In a main world village with 30+ villagers and 60+ animals nearby, TPS drops to 12.
    validations:
      required: true

  - type: textarea
    id: f3-data
    attributes:
      label: F3 debug info (text + screenshots)
      description: |
        Describe key F3 values here, then **drag F3 screenshots into the comment area**
        after submitting (any user can attach images in comments).

        Most useful values to transcribe:
        - mspt graph peak and average
        - Memory used / allocated
        - Chunk updates / entities rendered
        - Server ms / frame ms
      placeholder: |
        Example:
        - mspt peak: 95ms (constant during village traversal)
        - Memory: 3.4G / 4.0G
        - Chunks: 261 / 441
        - Entities: 312 (E:118, misc:194)
        - Server ms: 65
        - Frame ms: 28

        (Drag screenshots into the comment area below this issue.)
    validations:
      required: true

  - type: textarea
    id: log-excerpt
    attributes:
      label: Relevant log excerpt (optional)
      description: |
        Paste any [WARN] / [ERROR] lines from `logs/latest.log` that occurred around
        the same time as the lag. If you want the whole log, **drag `latest.log` (or a
        compressed .gz / .zip) into the comment area below this issue**.
      placeholder: |
        ```
        [12:34:56] [Render thread/WARN]: ...
        [12:34:57] [Server thread/ERROR]: ...
        ```
    validations:
      required: false

  - type: input
    id: mspt
    attributes:
      label: Average mspt (ms/tick)
      placeholder: "35"
    validations:
      required: true

  - type: input
    id: tps
    attributes:
      label: Estimated TPS
      placeholder: "15"
    validations:
      required: true

  - type: input
    id: ram-allocated
    attributes:
      label: Allocated heap memory
      placeholder: "4G (ZGC, -Xmx4096m)"
    validations:
      required: true

  - type: input
    id: ram-actual
    attributes:
      label: Actual memory usage (F3 top)
      placeholder: "3200 MB / 4096 MB"
    validations:
      required: true

  - type: input
    id: render-distance
    attributes:
      label: Render distance / simulation distance
      placeholder: "12 / 10"
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: "Windows 11 64-bit"
    validations:
      required: true

  - type: input
    id: cpu
    attributes:
      label: CPU
      placeholder: "AMD Ryzen 7 8845H"
    validations:
      required: true

  - type: input
    id: gpu
    attributes:
      label: GPU
      placeholder: "NVIDIA GeForce RTX 4060 Laptop"
    validations:
      required: true

  - type: checkboxes
    id: preflight
    attributes:
      label: Pre-submission checklist
      options:
        - label: I have provided F3 numeric data and described the scenario
          required: true
        - label: I have attached F3 screenshots in the comment area
          required: true
        - label: I have confirmed this is a persistent issue (not a one-off)
          required: true
        - label: I have tried lowering render distance; the problem persists
          required: true
