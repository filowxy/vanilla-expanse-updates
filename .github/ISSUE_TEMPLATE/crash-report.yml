name: Crash Report
description: Game startup, world entry, dimension change, or other crashes.
title: "[Crash] "
labels: ["bug", "crash"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for submitting a crash report. Please provide complete information; otherwise it is hard to locate the issue.
        If the crash is caused by a specific mod, please report it to that mod author's issue tracker (this repo does not maintain third-party mods).

  - type: dropdown
    id: crash-phase
    attributes:
      label: Crash phase
      description: At what stage did the crash occur?
      options:
        - Startup (JVM boot / mod loading)
        - Main menu
        - Entering world
        - In-game (random crash during play)
        - Dimension change / teleport
        - Exiting world / closing game
        - Other
    validations:
      required: true

  - type: textarea
    id: crash-log
    attributes:
      label: Crash log
      description: |
        Paste the full content of one of the following files. Do not truncate.

        - `logs/latest.log`
        - `logs/debug.log`
        - `crash-reports/crash-YYYY-MM-DD_HH.MM.SS-client.txt`
        - `hs_err_pid*.log` (JVM crash log)

        **Tip**: If the log is very large, please compress it into a `.zip` or `.gz` and
        **drag the archive into the comment area** below the issue body after submitting
        (GitHub supports file drag-and-drop in comments for any user). That keeps the
        issue body readable while still giving us the full log.
      placeholder: |
        [Paste the complete log here]

        Or attach a compressed archive in the comment area below this issue.
    validations:
      required: true

  - type: textarea
    id: repro-steps
    attributes:
      label: Steps to reproduce
      description: Operations required to trigger the crash (from launching the launcher).
      placeholder: |
        1. Launch the game
        2. Create/enter a world, ...
        3. ...
    validations:
      required: true

  - type: textarea
    id: expected-vs-actual
    attributes:
      label: Expected vs actual behavior
      description: Describe what you expected to happen and what actually happened.
      placeholder: |
        **Expected**: Game enters the world normally.
        **Actual**: Game crashes immediately on world entry; crash report shows ...
    validations:
      required: true

  - type: input
    id: mc-version
    attributes:
      label: Minecraft version
      placeholder: "1.21.1"
    validations:
      required: true

  - type: input
    id: neoforge-version
    attributes:
      label: NeoForge version
      placeholder: "21.1.233"
    validations:
      required: true

  - type: input
    id: java-version
    attributes:
      label: Java version
      placeholder: "21.0.7 (Microsoft OpenJDK 64-Bit Server VM)"
    validations:
      required: true

  - type: dropdown
    id: launcher
    attributes:
      label: Launcher
      options:
        - PCL
        - HMCL
        - MultiMC
        - CurseForge App
        - Prism Launcher
        - Other
    validations:
      required: true

  - type: input
    id: ram
    attributes:
      label: Allocated memory
      placeholder: "4G (ZGC, -Xmx4096m)"
    validations:
      required: true

  - type: dropdown
    id: modded-clean
    attributes:
      label: Tested in clean state?
      description: Does the crash still occur after removing all mods not included in the modpack?
      options:
        - No extra mods (pristine modpack state)
        - Extra mods present; crash disappears when removed
        - Extra mods present; crash persists when removed
        - Not tested
    validations:
      required: true

  - type: checkboxes
    id: preflight
    attributes:
      label: Pre-submission checklist
      options:
        - label: I have searched existing issues and confirmed no duplicate
          required: true
        - label: I have provided the complete crash log (pasted and/or attached as a file)
          required: true
        - label: I have provided reproduction steps and expected/actual behavior
          required: true
