name: 崩溃报告
description: 游戏启动、进入世界、跨维度或其他场景下的崩溃。
title: "[Crash] "
labels: ["bug", "crash"]
body:
  - type: markdown
    attributes:
      value: |
        感谢你提交崩溃报告。请尽量提供完整信息，否则我们难以定位问题。
        如果崩溃由特定模组触发，请直接提交到该模组作者的 issue 页面（这个仓库不维护第三方模组）。

  - type: dropdown
    id: crash-phase
    attributes:
      label: 崩溃阶段
      description: 崩溃发生在什么阶段？
      options:
        - 启动阶段（JVM 启动中 / 模组加载）
        - 主菜单（进入主菜单时）
        - 进入世界
        - 游戏中（游玩中随机崩溃）
        - 跨维度 / 传送
        - 退出世界 / 关闭游戏
        - 其他
    validations:
      required: true

  - type: textarea
    id: crash-log
    attributes:
      label: 崩溃日志
      description: |
        请粘贴以下文件之一的完整内容（不要截取片段）：
        - `logs/latest.log`
        - `logs/debug.log`
        - `crash-reports/crash-YYYY-MM-DD_HH.MM.SS-client.txt`
        - `hs_err_pid*.log`（JVM 崩溃时生成）
      placeholder: |
        [请在这里粘贴完整日志]
        长日志请用 <details> 折叠：
        <details><summary>点击展开完整日志</summary>

        ```
        [日志内容]
        ```
        </details>
    validations:
      required: true

  - type: textarea
    id: repro-steps
    attributes:
      label: 复现步骤
      description: 触发崩溃需要的操作（从打开启动器开始描述）。
      placeholder: |
        1. 启动游戏
        2. 创建/进入世界，...
        3. ...
    validations:
      required: true

  - type: textarea
    id: expected-vs-actual
    attributes:
      label: 预期行为 vs 实际行为
      description: 描述你期望发生什么，实际发生了什么。
      placeholder: |
        **预期**: 游戏正常进入世界。
        **实际**: 进入世界时立即崩溃，崩溃报告为 ...
    validations:
      required: true

  - type: input
    id: mc-version
    attributes:
      label: Minecraft 版本
      placeholder: "1.21.1"
    validations:
      required: true

  - type: input
    id: neoforge-version
    attributes:
      label: NeoForge 版本
      placeholder: "21.1.233"
    validations:
      required: true

  - type: input
    id: java-version
    attributes:
      label: Java 版本
      placeholder: "21.0.7 (Microsoft OpenJDK 64-Bit Server VM)"
    validations:
      required: true

  - type: dropdown
    id: launcher
    attributes:
      label: 启动器
      options:
        - PCL
        - HMCL
        - MultiMc
        - CurseForge App
        - Prism Launcher
        - 其他
    validations:
      required: true

  - type: input
    id: ram
    attributes:
      label: 分配内存
      placeholder: "4G (ZGC, -Xmx4096m)"
    validations:
      required: true

  - type: dropdown
    id: modded-clean
    attributes:
      label: 是否做过纯净测试
      description: 移除所有非整合包自带的额外 mod 后是否仍崩溃。
      options:
        - 没有额外 mod（即纯净整合包状态）
        - 有额外 mod，移除后不崩溃
        - 有额外 mod，移除后仍崩溃
        - 没有测试
    validations:
      required: true

  - type: checkboxes
    id: preflight
    attributes:
      label: 提交前检查
      options:
        - label: 我已搜索过现有 issue，确认没有重复
          required: true
        - label: 我已提供完整崩溃日志（非片段）
          required: true
        - label: 我已提供复现步骤和预期/实际行为
          required: true
