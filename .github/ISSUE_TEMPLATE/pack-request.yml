name: Pack Request
description: Request to add a mod, remove a mod, adjust default configuration, or add a new feature.
title: "[Request] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        All requests will be evaluated, but adoption is not guaranteed.
        Please search existing issues before submitting to avoid duplicates.

  - type: dropdown
    id: request-type
    attributes:
      label: Request type
      options:
        - Add mod
        - Remove mod
        - Adjust default configuration
        - Add modpack feature
        - Other
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Request description
      description: Describe in detail what change you would like the modpack to make.
      placeholder: |
        e.g. I'd like the modpack to add the JEI sidebar plugin EMI to make recipe lookup easier.
    validations:
      required: true

  - type: input
    id: target
    attributes:
      label: Related mod / content name
      description: If the request is mod-related, provide the mod name (modid or display name).
      placeholder: "modid or display name"
    validations:
      required: false

  - type: textarea
    id: reason
    attributes:
      label: Why is this request valuable?
      description: Impact on the modpack playerbase, problem solved, or fun delivered.
      placeholder: |
        e.g. The modpack currently lacks [X] category content; adding [Y mod] would fill this gap.
        This mod is compatible with [Z optimization mod] and has been verified on the test server.
    validations:
      required: true

  - type: dropdown
    id: impact
    attributes:
      label: Your view of the performance impact
      options:
        - Strongly positive (reduces lag / memory)
        - Slightly positive
        - Neutral (no significant impact)
        - Slightly negative
        - Strongly negative (increases lag / memory)
        - Unsure
    validations:
      required: true

  - type: checkboxes
    id: preflight
    attributes:
      label: Pre-submission checklist
      options:
        - label: I have searched existing requests and confirmed no duplicate
          required: true
        - label: I have explained the value of this request to the modpack
          required: true
        - label: I understand this request may not be adopted
          required: true
